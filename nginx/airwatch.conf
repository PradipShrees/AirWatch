server {
    listen 8080;
    server_name _;

    root /home/raspberry/airwatch/nginx/dist;
    index index.html;

    # Hashed assets are content-addressed — safe to cache forever.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Never cache index.html — it points to the current bundle hash.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires off;
    }

    # Serve React SPA — all non-asset routes go to index.html
    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires off;
        try_files $uri $uri/ /index.html;
    }

    # Proxy REST API
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # Proxy WebSocket
    location /api/ws/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_read_timeout 3600;
    }
}
